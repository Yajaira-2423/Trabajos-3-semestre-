<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - Pronóstico Clima</title>
    
    <link rel="stylesheet" href="bootstrap.min.css">
    
    <link rel="stylesheet" href="estilos.css">
</head>
<div class="container mt-5">
    <h1 class="titulo">Pronóstico del Clima</h1>
    
    <div class="table-responsive">
        <table class="table table-bordered table-homework">
            <thead>
                <tr>
                    <th>Día</th>
                    <th>Hoy</th>
                    <th>Mañana</th>
                    <th>Miércoles</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th scope="row">Condición</th>
                    <td>Soleado</td>
                    <td>Mayormente soleado</td>
                    <td>Parcialmente nublado</td>
                </tr>
                <tr>
                    <th scope="row">Temperatura</th>
                    <td>19°C</td>
                    <td>17°C</td>
                    <td>12°C</td>
                </tr>
                <tr>
                    <th scope="row">Vientos</th>
                    <td>E 13 km/h</td>
                    <td>E 11 km/h</td>
                    <td>S 16 km/h</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
